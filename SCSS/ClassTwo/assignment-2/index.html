<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procurement Channels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>

    <!-- .section = BEM block wrapping the whole layout -->
    <section class="section">
      <p class="section__label">Get Started</p>
      <h2 class="section__title">Procurement Channels</h2>

      <div class="section__grid">
        <!-- .card = BEM block, .card__logo = element holding the img -->
        <div class="card">
          <div class="card__logo">
            <img src="first.png" alt="AWS Marketplace" />
          </div>
        </div>

        <div class="card">
          <div class="card__logo">
            <img src="second.png" alt="HGACBuy" />
          </div>
        </div>

        <div class="card">
          <div class="card__logo">
            <img src="third.png" alt="Marketplace.city" />
          </div>
        </div>

      </div>
    </section>

  </body>
</html>
