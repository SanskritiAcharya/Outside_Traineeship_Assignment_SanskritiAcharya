<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Task 13 —CSS Methodologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="l-page">
  <!--BLOCK: person-card
    The whole card is one block. I renamed it from profile-card to person-card — feels more natural to me.
    Child elements use __ double underscore as per BEM.
  -->
  <article class="person-card">
    <!-- ELEMENT: person-card__left -->
    <section class="person-card__left">

      <!-- ELEMENT: person-card__pic-ring and __pic
        Kept as elements of person-card, not their own block, because this spinning ring only makes sense inside this card.
      -->
      <div class="person-card__pic-ring">
        <img class="person-card__pic" src="pic.png" alt="Jessica Potter" />
      </div>

      <!-- ELEMENT: name and job title -->
      <span class="person-card__name">Jessica Potter</span>
      <p class="person-card__job">Visual Artist</p>

      <!--BLOCK: bio-btn
        Button is its own block — it can exist anywhere on a page.
        bio-btn = shared structure. --outline / --filled = skin modifier (OOCSS).
      -->
      <button class="bio-btn bio-btn--outline">Follow</button>
      <button class="bio-btn bio-btn--filled">Message</button>

    </section>

    <!-- ELEMENT: person-card__stats -->
    <aside class="person-card__stats">

      <!--BLOCK: count-box
        Its own block because the number tiles could exist outside this card.
        --default = normal beige. --highlighted = darker Likes tile.
        Same structure, different skin — OOCSS.
      -->
      <div class="count-box count-box--default">
        <span class="count-box__num">523</span>
        <span class="count-box__tag">Posts</span>
      </div>

      <!-- ELEMENT: thin gap between count-boxes -->
      <div class="person-card__stats-gap"></div>

      <div class="count-box count-box--highlighted">
        <span class="count-box__num">1387</span>
        <span class="count-box__tag">Likes</span>
      </div>
      <div class="person-card__stats-gap"></div>
      <div class="count-box count-box--default">
        <span class="count-box__num">146</span>
        <span class="count-box__tag">Follower</span>
      </div>
    </aside>
  </article>
</body>
</html>
