<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Class One Task 4</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      font-family: Georgia, serif;
    }
    header {
      background-color: #888888;
      padding: 20px;
    }
    header h1 {
      color: white;
      font-size: 28px;
    }
    .middle-one {
      overflow: hidden;
    }
    .leftmenu {
      float: left;
      width: 23%;
      padding: 10px;
    }
    .leftmenu a {
      display: block;
      background-color: #44AADD;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      margin-bottom: 2px;
      font-size: 14px;
    }
    .rightcontent {
      float: left;
      width: 75%;
      padding: 30px 30px;
    }
    .rightcontent h2 {
      font-size: 26px;
      margin-bottom: 17px;
    }
    .rightcontent p {
      margin-bottom: 10px;
      color: #333;
      line-height: 1.3;
    }
    footer {
      background-color: #888888;
      padding: 16px 20px;
      clear: both;
    }
    footer p {
      color: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chania</h1>
  </header>
  <div class="middle-one">
    <nav class="leftmenu">
      <a href="#">The Flight</a>
      <a href="#">The City</a>
      <a href="#">The Island</a>
      <a href="#">The Food</a>
    </nav>
    <article class="rightcontent">
      <h2>The City</h2>
      <p>Chania is the capital of the Chania region on the island of Crete. The city can be divided in two parts, the old town and the modern city.</p>
      <p>You will learn more about web layout and responsive web pages in a later chapter.</p>
    </article>
  </div>
  <footer>
    <p>Footer Text</p>
  </footer>
</body>
</html>
