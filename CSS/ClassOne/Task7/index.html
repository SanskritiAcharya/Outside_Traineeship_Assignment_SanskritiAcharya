<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Class One Task 6</title>
  <style>

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    section {
      border: 4px solid black;
      padding: 30px;
    }

    .myrow {
      display: grid;
      grid-template-columns: 30px repeat(8, 70px) 30px;
      align-items: center;
    }

    .myrow::before {
      content: attr(data-num);
      text-align: center;
      font-weight: bold;
      font-size: 16px;
    }

    .myrow::after {
      content: attr(data-num);
      text-align: center;
      font-weight: bold;
      font-size: 16px;
    }

    .mybox {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
    }

    .mybox:has(img) {
      opacity: 1;
      background-color: white ;
    }

    .mybox:hover {
      background-color: #f0c040;
      opacity: 1;
    }

    .lightcolor {
      background-color: #aaaaaa;
    }

    .darkcolor {
      background-color: #000000;
    }

    .mybox img {
      width: 54px;
      height: 54px;
    }

    .letterrow {
      display: grid;
      grid-template-columns: 30px repeat(8, 70px) 30px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      margin: 4px 0;
    }

  </style>
</head>
<body>

<section>

  <div class="letterrow">
    <span></span>
    <span>A</span><span>B</span><span>C</span><span>D</span>
    <span>E</span><span>F</span><span>G</span><span>H</span>
    <span></span>
  </div>

  <div class="myrow" data-num="8">
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor">
      <img src="king.png" alt="king" />
    </div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
  </div>

  <div class="myrow" data-num="7">
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor">
      <img src="knight.png" alt="Knight" />
    </div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
  </div>

  <div class="myrow" data-num="6">
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
  </div>

  <div class="myrow" data-num="5">
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
  </div>

  <div class="myrow" data-num="4">
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
  </div>

  <div class="myrow" data-num="3">
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
  </div>

  <div class="myrow" data-num="2">
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
  </div>

  <div class="myrow" data-num="1">
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
    <div class="mybox lightcolor"></div>
    <div class="mybox darkcolor"></div>
  </div>

  <div class="letterrow">
    <span></span>
    <span>A</span><span>B</span><span>C</span><span>D</span>
    <span>E</span><span>F</span><span>G</span><span>H</span>
    <span></span>
  </div>

</section>

</body>
</html>
