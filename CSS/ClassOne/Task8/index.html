<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Class One Task 8</title>
    <style>
        body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.shape {
    position: absolute;
    left: 50%;
    top: 100px;
    width: 60px;
    height: 60px;
    margin-left: -30px;
    margin-top: -30px;
    background: green;
    border-radius: 50%;
    animation: work 3.5s infinite linear;
}

@keyframes work {

    0% {
        top: 100px;
        width: 60px;
        height: 60px;
        margin-left: -30px;
        margin-top: -30px;
        background: green;
        border-radius: 50%;
        transform: rotate(0deg);
    }

    45%,
    55% {
        top: 350px;
        width: 140px;
        height: 140px;
        margin-left: -70px;
        margin-top: -70px;
        background: pink;
        border-radius: 0%;
        transform: rotate(-360deg);
    }

    100% {
        top: 100px;
        width: 60px;
        height: 60px;
        margin-left: -30px;
        margin-top: -30px;
        background: green;
        border-radius: 50%;
        transform: rotate(-360deg);
    }
}
    </style>
</head>
<body>
    <div class="shape"></div>
</body>

</html>
