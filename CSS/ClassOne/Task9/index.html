<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Class One Task 9</title>
  <style>
    body {
      padding: 20px;
    }
    .each-method {
      margin-bottom: 50px;
    }
    .pink-box {
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: rgb(128, 0, 87);
      color: rgb(137, 161, 137);
      font-size: 18px;
      font-weight: bold;
      vertical-align: top;
      padding: 8px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="each-method">
    <div class="pink-box">inline</div>
    <div class="pink-box">block</div>
  </div>

  <div class="each-method">
    <div class="pink-box">inline</div><div class="pink-box">block</div>
  </div>

  <div class="each-method">
    <div style="font-size: 0;">
      <div class="pink-box" style="font-size: 18px;">inline</div>
      <div class="pink-box" style="font-size: 18px;">block</div>
    </div>
  </div>


  <div class="each-method">
    <div class="pink-box">inline</div>
    <div class="pink-box">block</div>
  </div>

  <div class="each-method">
    <div class="pink-box" style="margin-right: -4px;">inline</div>
    <div class="pink-box">block</div>
  </div>

</body>
</html>
