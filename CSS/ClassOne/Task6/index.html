<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Class One Task 6</title>
  <style>
    body {
      padding: 30px;
    }
    button {
      background-color: pink;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      border-radius: 4px;
      transition: 0.3s;
    }
    button:hover {
      background-color: palevioletred;
      transform: scale(1.1);
    }
    button:active {
      transform: scale(0.95);
    }
    input {
      padding: 10px;
      border: 2px solid #ccc;
      outline: none;
      margin-top: 20px;
      display: block;
      width: 250px;
      border-radius: 4px;
      transition: 0.3s;
    }
    input:focus {
      border-color: orange;
      box-shadow: 0 0 5px orangered;
    }
  </style>
</head>
<body>
  <button>Button 1</button>
  <button>Button 2</button>
  <input type="text" placeholder="Click here to focus effect" />
</body>
</html>
