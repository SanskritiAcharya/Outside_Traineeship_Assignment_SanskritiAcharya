<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Class One Task 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    .entire-page {
      padding: 50px 200px;
    }
    .image-text {
      display: flex;
      align-items: center;
      margin-bottom: 60px;
    }
    .photo {
      width: 75%;
      height: 380px;
      object-fit: cover;
    }
    .content-part {
      width: 55%;
      padding: 40px;
    }
    .content-part h1 {
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .content-part p {
      font-size: 16px;
      line-height: 1.5;
      color: #333;
    }
    @media (max-width: 600px) {
      .entire-page {
        padding: 0;
      }
      .image-text {
        flex-direction: column;
        margin-bottom: 40px;
      }
      .content-part {
        width: 100%;
        padding: 20px 25px;
      }
      .photo {
        order: 1;
        width: 100%;
        height: 250px;
      }
      .content-part h1 {
        font-size: 25px;
        margin-bottom: 12px;
      }
      .content-part p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
<main class="entire-page">

  <section class="image-text">
    <img class="photo" src="upper.jpg" alt="Stone" />
    <div class="content-part">
      <h1>Far far away, behind the word mountains</h1>
      <p>Far far away, behind the word mountains, far from the countries Vokalia and Consonantia...</p>
    </div>
  </section>

  <section class="image-text">
    <div class="content-part">
      <h1>Far far away, behind the word mountains</h1>
      <p>Far far away, behind the word mountains, far from the countries Vokalia and Consonantia...</p>
    </div>
    <img class="photo" src="lower.jpg" alt="Beach" />
  </section>
</main>
</body>
</html>
